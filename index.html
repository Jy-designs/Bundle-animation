<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stack Push Animation</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fbfbfa;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .scene {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stack {
    position: relative;
    width: 340px;
    height: 240px;
  }
 
  .card {
    position: absolute;
    top: 48px;
    left: 50%;
    width: 290px;
    height: 171px;
    border-radius: 32px;
    box-shadow: 0 20px 44px -10px rgba(15,15,25,.28), 0 6px 14px -6px rgba(15,15,25,.14);
    transition: transform .5s cubic-bezier(.4,0,.2,1), opacity .4s ease;
  }
  .card .content {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card .content svg { height: 44%; aspect-ratio: 1 / 1; }
 
  /* sits over .content and hides the real colour until this card's turn to be front */
  .card .mask {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity .5s ease, background-color .5s ease;
    pointer-events: none;
  }
 
  /* resting positions, back-most to front-most */
  .card.role-back  { transform: translate(-50%, -40px) scale(0.80); z-index: 1; }
  .card.role-mid   { transform: translate(-50%, -24px) scale(0.89); z-index: 2; }
  .card.role-front { transform: translate(-50%, 0) scale(1);        z-index: 3; }
  .card.role-exit  {
    transform: translate(-50%, 210px) scale(0.94) rotate(6deg);
    opacity: 0;
    z-index: 0;
  }
 
  /* only mid & back are masked grey — front is always fully revealed */
  .card.role-mid .mask  { opacity: 1; background: #e7e5e1; }
  .card.role-back .mask { opacity: 1; background: #f2f0ec; }
 
</style>
</head>
<body>
  <div class="scene">
    <div class="stack" id="stack"></div>
  </div>
 
<script>
  // Swap these for your own icons: any hex/gradient background + inline SVG mark.
  const ICONS = [
    {
      bg: '#F6C6D2',
      svg: `<svg viewBox="0 0 100 100"><path d="M25 52 L42 70 L76 30" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`
    },
    {
      bg: 'linear-gradient(150deg,#211f45,#15142c)',
      svg: `<svg viewBox="0 0 100 100">
        <defs>
          <linearGradient id="bars" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FDB44B"/>
            <stop offset="50%" stop-color="#F2545B"/>
            <stop offset="100%" stop-color="#7B2FF7"/>
          </linearGradient>
          <radialGradient id="sphere" cx="35%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#FFD98E"/>
            <stop offset="100%" stop-color="#B96A2C"/>
          </radialGradient>
        </defs>
        <rect x="14" y="14" width="30" height="72" rx="8" fill="url(#bars)"/>
        <circle cx="70" cy="38" r="22" fill="url(#sphere)"/>
      </svg>`
    },
    {
      bg: '#F7F5F0',
      svg: `<svg viewBox="0 0 100 100">
        <g fill="#6C4EF5">
          <rect x="46" y="6" width="8" height="32" rx="4"/>
          <rect x="46" y="6" width="8" height="32" rx="4" transform="rotate(45 50 50)"/>
          <rect x="46" y="6" width="8" height="32" rx="4" transform="rotate(90 50 50)"/>
          <rect x="46" y="6" width="8" height="32" rx="4" transform="rotate(135 50 50)"/>
          <rect x="46" y="6" width="8" height="32" rx="4" transform="rotate(180 50 50)"/>
          <rect x="46" y="6" width="8" height="32" rx="4" transform="rotate(225 50 50)"/>
          <rect x="46" y="6" width="8" height="32" rx="4" transform="rotate(270 50 50)"/>
          <rect x="46" y="6" width="8" height="32" rx="4" transform="rotate(315 50 50)"/>
        </g>
        <circle cx="50" cy="50" r="11" fill="#F7F5F0"/>
      </svg>`
    },
    {
      bg: '#C8EDE0',
      svg: `<svg viewBox="0 0 100 100"><path d="M50 20 L84 80 L16 80 Z" fill="#1E5C4A"/></svg>`
    },
    {
      bg: '#FCE1A8',
      svg: `<svg viewBox="0 0 100 100"><path d="M56 12 L28 55 H46 L40 88 L76 40 H54 Z" fill="#1a1a1a"/></svg>`
    },
    {
      bg: '#CFE3F7',
      svg: `<svg viewBox="0 0 100 100">
        <path d="M14 38 Q29 22 44 38 T74 38" stroke="#1B3A6B" stroke-width="8" fill="none" stroke-linecap="round"/>
        <path d="M14 60 Q29 44 44 60 T74 60" stroke="#1B3A6B" stroke-width="8" fill="none" stroke-linecap="round"/>
      </svg>`
    }
  ];
 
  const CYCLE_MS = 2500; // time between pushes
  const PUSH_MS = 520;   // matches the transform transition length
 
  const stackEl = document.getElementById('stack');
 
  function makeCard(iconIndex, roleClass) {
    const el = document.createElement('div');
    el.className = `card ${roleClass}`;
 
    const content = document.createElement('div');
    content.className = 'content';
    content.style.background = ICONS[iconIndex].bg;
    content.innerHTML = ICONS[iconIndex].svg;
 
    const mask = document.createElement('div');
    mask.className = 'mask';
 
    el.appendChild(content);
    el.appendChild(mask);
    return el;
  }
 
  // three real cards at all times — back and mid just keep their true
  // colour hidden under a grey mask until it's their turn to be front
  let front = makeCard(0, 'role-front');
  let mid   = makeCard(1, 'role-mid');
  let back  = makeCard(2, 'role-back');
  stackEl.append(back, mid, front);
  let queueIdx = 3;
 
  function cycle() {
    const oldFront = front;
    oldFront.classList.remove('role-front');
    oldFront.classList.add('role-exit');
 
    // mid grows into the front slot, its mask fades to reveal its true
    // colour, and it jumps above the old front in stacking order — so it
    // visibly pushes the old card down and away as it arrives
    mid.classList.remove('role-mid');
    mid.classList.add('role-front');
 
    // back grows into the mid slot, staying masked grey
    back.classList.remove('role-back');
    back.classList.add('role-mid');
 
    // a fresh card joins at the back, also masked grey
    const newBack = makeCard(queueIdx % ICONS.length, 'role-back');
    queueIdx++;
    stackEl.appendChild(newBack);
 
    front = mid;
    mid = back;
    back = newBack;
 
    setTimeout(() => oldFront.remove(), PUSH_MS);
  }
 
  setInterval(cycle, CYCLE_MS);
</script>
</body>
</html>
